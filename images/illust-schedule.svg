<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 220" fill="none">
  <!-- ground shadow -->
  <ellipse cx="120" cy="205" rx="90" ry="6" fill="#000" opacity="0.05"/>

  <!-- wall calendar/schedule board -->
  <g>
    <rect x="78" y="22" width="138" height="110" rx="6" fill="#ffffff" stroke="#b3b3b3" stroke-width="2"/>
    <!-- pinned dots (top corners) -->
    <circle cx="86" cy="30" r="2.5" fill="#d56c7a"/>
    <circle cx="208" cy="30" r="2.5" fill="#d56c7a"/>
    <!-- header band -->
    <rect x="78" y="22" width="138" height="22" rx="6" fill="#e89cc5"/>
    <rect x="78" y="36" width="138" height="8" fill="#e89cc5"/>
    <!-- header dashes (mock title) -->
    <rect x="92" y="30" width="32" height="4" rx="2" fill="#ffffff" opacity="0.85"/>
    <rect x="130" y="30" width="20" height="4" rx="2" fill="#ffffff" opacity="0.85"/>
    <rect x="156" y="30" width="46" height="4" rx="2" fill="#ffffff" opacity="0.85"/>

    <!-- vertical grid lines -->
    <line x1="106" y1="44" x2="106" y2="132" stroke="#e2e2e2" stroke-width="1"/>
    <line x1="134" y1="44" x2="134" y2="132" stroke="#e2e2e2" stroke-width="1"/>
    <line x1="162" y1="44" x2="162" y2="132" stroke="#e2e2e2" stroke-width="1"/>
    <line x1="190" y1="44" x2="190" y2="132" stroke="#e2e2e2" stroke-width="1"/>
    <!-- horizontal grid lines -->
    <line x1="78" y1="66" x2="216" y2="66" stroke="#e2e2e2" stroke-width="1"/>
    <line x1="78" y1="88" x2="216" y2="88" stroke="#e2e2e2" stroke-width="1"/>
    <line x1="78" y1="110" x2="216" y2="110" stroke="#e2e2e2" stroke-width="1"/>

    <!-- entries on schedule -->
    <rect x="84" y="50" width="18" height="10" rx="2" fill="#a9d99d"/>
    <rect x="110" y="72" width="20" height="10" rx="2" fill="#fbd683"/>
    <rect x="138" y="94" width="22" height="10" rx="2" fill="#8fc6e2"/>
    <rect x="166" y="50" width="20" height="10" rx="2" fill="#e89cc5" opacity="0.8"/>
    <rect x="194" y="72" width="18" height="10" rx="2" fill="#a9d99d" opacity="0.8"/>
    <!-- checkmark -->
    <path d="M 196 116 L 200 122 L 208 110" stroke="#54a05c" stroke-width="2.4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- circle highlight -->
    <circle cx="118" cy="116" r="6.5" fill="none" stroke="#d56c7a" stroke-width="1.8"/>
  </g>

  <!-- woman in front pointing at chart -->
  <g transform="translate(48 110)">
    <!-- legs -->
    <path d="M -14 60 L 14 60 L 11 85 L -11 85 Z" fill="#f5f5f5" stroke="#bbbbbb" stroke-width="1"/>
    <!-- body -->
    <path d="M -16 8 Q -16 -2 0 -2 Q 16 -2 16 8 L 16 60 L -16 60 Z" fill="#8fc6e2"/>
    <!-- collar -->
    <path d="M -6 -2 L 0 8 L 6 -2 Z" fill="#ffffff"/>
    <!-- head -->
    <circle cx="0" cy="-18" r="14" fill="#fbd6b3"/>
    <!-- hair -->
    <path d="M -14 -18 Q -14 -34 0 -34 Q 14 -34 14 -18 L 16 -8 Q 17 4 14 9 L 10 9 Q 13 0 12 -10 Q 11 -18 8 -19 Q 0 -21 -8 -19 Q -11 -18 -12 -10 Q -13 0 -10 9 L -14 9 Q -17 4 -16 -8 Z" fill="#4a3024"/>
    <!-- bangs -->
    <path d="M -8 -26 Q 0 -31 8 -26 Q 4 -20 0 -20 Q -4 -20 -8 -26 Z" fill="#3a2820"/>
    <!-- raised arm pointing toward chart -->
    <path d="M 14 10 Q 28 0 38 -10" stroke="#fbd6b3" stroke-width="7" stroke-linecap="round" fill="none"/>
    <!-- pointing finger -->
    <circle cx="40" cy="-12" r="4" fill="#fbd6b3"/>
    <!-- left arm hanging -->
    <path d="M -16 14 Q -22 30 -22 50" stroke="#fbd6b3" stroke-width="7" stroke-linecap="round" fill="none"/>
  </g>
</svg>
