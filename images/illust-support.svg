<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 220" fill="none">
  <!-- ground shadow -->
  <ellipse cx="120" cy="200" rx="85" ry="6" fill="#000" opacity="0.05"/>

  <!-- Left woman (mint uniform) -->
  <g>
    <!-- skirt / pants -->
    <path d="M 58 168 L 102 168 L 98 198 L 62 198 Z" fill="#f5f5f5" stroke="#bbbbbb" stroke-width="1"/>
    <!-- body / uniform top -->
    <path d="M 58 110 Q 58 98 80 98 Q 102 98 102 110 L 102 168 L 58 168 Z" fill="#a9d99d"/>
    <!-- collar -->
    <path d="M 74 100 L 80 110 L 86 100 Z" fill="#ffffff"/>
    <!-- head -->
    <circle cx="80" cy="80" r="17" fill="#fbd6b3"/>
    <!-- hair (medium length female) -->
    <path d="M 63 80 Q 62 58 80 58 Q 98 58 97 80 L 100 92 Q 101 102 96 108 L 92 108 Q 95 98 93 88 Q 92 80 88 78 Q 80 75 72 78 Q 68 80 67 88 Q 65 98 68 108 L 64 108 Q 59 102 60 92 Z" fill="#4a3024"/>
    <!-- bangs -->
    <path d="M 72 72 Q 80 67 88 72 Q 84 78 80 78 Q 76 78 72 72 Z" fill="#3a2820"/>
    <!-- outer (left) arm hanging -->
    <path d="M 58 118 Q 50 140 48 162" stroke="#fbd6b3" stroke-width="8" stroke-linecap="round" fill="none"/>
  </g>

  <!-- Right woman (pink uniform) - arm draped over left woman -->
  <g>
    <path d="M 138 168 L 182 168 L 178 198 L 142 198 Z" fill="#f5f5f5" stroke="#bbbbbb" stroke-width="1"/>
    <path d="M 138 110 Q 138 98 160 98 Q 182 98 182 110 L 182 168 L 138 168 Z" fill="#e89cc5"/>
    <path d="M 154 100 L 160 110 L 166 100 Z" fill="#ffffff"/>
    <circle cx="160" cy="80" r="17" fill="#fbd6b3"/>
    <!-- hair (long, side-flowing) -->
    <path d="M 143 80 Q 142 58 160 58 Q 178 58 177 80 L 182 94 Q 184 112 180 118 L 174 118 Q 178 104 176 90 Q 175 80 171 78 Q 160 75 149 78 Q 145 80 144 90 Q 142 104 146 118 L 140 118 Q 136 112 138 94 Z" fill="#5c4438"/>
    <!-- bangs -->
    <path d="M 152 72 Q 160 67 168 72 Q 164 78 160 78 Q 156 78 152 72 Z" fill="#3a2820"/>
    <!-- arm reaching across to left woman's shoulder -->
    <path d="M 142 108 Q 124 100 108 102 Q 102 103 100 106" stroke="#fbd6b3" stroke-width="8" stroke-linecap="round" fill="none"/>
    <!-- hand on shoulder -->
    <circle cx="100" cy="107" r="5" fill="#fbd6b3"/>
    <!-- outer (right) arm hanging -->
    <path d="M 182 118 Q 190 140 192 162" stroke="#fbd6b3" stroke-width="8" stroke-linecap="round" fill="none"/>
  </g>

  <!-- heart between heads -->
  <g transform="translate(120 50)">
    <path d="M 0 3 C -7 -5, -13 0, 0 12 C 13 0, 7 -5, 0 3 Z" fill="#d56c7a"/>
  </g>
</svg>
